version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: ot-inventory-db
    environment:
      POSTGRES_USER: otuser
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: ot_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../backend
      dockerfile: ../infrastructure/docker/Dockerfile.backend
    container_name: ot-inventory-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://otuser:changeme@db:5432/ot_inventory
      SCAN_ENABLED: "false"
      PASSIVE_ENABLED: "false"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../../backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: ot-inventory-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
